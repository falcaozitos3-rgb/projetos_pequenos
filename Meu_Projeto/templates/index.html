<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema De Acesso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="corpo-do-projeto">
    <div class="interface">
        <h1>BEM-VINDO</h1>
        <h2>SISTEMA DE ACESSO</h2>
        <form method="POST">
            <p>  <input type="text" name="nome" placeholder="Digite seu nome" required> </p>
            <p>  <input type="number" name="idade" placeholder="Digite sua idade" required> </p>
            <p>  <input type="text" name="cadastro" placeholder="Digite se tem cadastro" required> </p>

            <button type="submit">Enviar</button>
        </form>
        </div>
        <!-- aqui  aparecerar o que o python prosesou -->
        {% if resposta %}
            <div class="caixa-resposta">
                <h3>{{ resposta }}</h3>
            </div>
        {% endif %}
    </div>
</body>
</html>
